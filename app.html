<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HR Dashboard — Login</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg:      #0a0a0f;
    --surface: #13131a;
    --border:  #1e1e2e;
    --accent:  #4ade80;
    --accent2: #22c55e;
    --text:    #e2e8f0;
    --muted:   #64748b;
    --danger:  #f87171;
  }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: "DM Sans", sans-serif;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
  }

  /* Grid background */
  body::before {
    content: "";
    position: fixed;
    inset: 0;
    background-image:
      linear-gradient(rgba(74,222,128,.03) 1px, transparent 1px),
      linear-gradient(90deg, rgba(74,222,128,.03) 1px, transparent 1px);
    background-size: 40px 40px;
    pointer-events: none;
  }

  /* Glow */
  body::after {
    content: "";
    position: fixed;
    top: -200px;
    left: 50%;
    transform: translateX(-50%);
    width: 600px;
    height: 600px;
    background: radial-gradient(circle, rgba(74,222,128,.08) 0%, transparent 70%);
    pointer-events: none;
  }

  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 48px 40px;
    width: 100%;
    max-width: 380px;
    position: relative;
    animation: fadeUp .4s ease;
  }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(20px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .logo {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 32px;
  }

  .logo-icon {
    width: 36px;
    height: 36px;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    border-radius: 10px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 18px;
  }

  .logo-text {
    font-size: 18px;
    font-weight: 600;
    letter-spacing: -0.3px;
  }

  .logo-sub {
    font-size: 11px;
    color: var(--muted);
    font-family: "DM Mono", monospace;
    letter-spacing: 1px;
    text-transform: uppercase;
  }

  h1 {
    font-size: 24px;
    font-weight: 600;
    margin-bottom: 8px;
    letter-spacing: -0.5px;
  }

  .subtitle {
    color: var(--muted);
    font-size: 14px;
    margin-bottom: 32px;
  }

  label {
    display: block;
    font-size: 13px;
    font-weight: 500;
    color: var(--muted);
    margin-bottom: 8px;
    font-family: "DM Mono", monospace;
    text-transform: uppercase;
    letter-spacing: 0.5px;
  }

  input {
    width: 100%;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 12px 16px;
    color: var(--text);
    font-size: 15px;
    font-family: "DM Mono", monospace;
    outline: none;
    transition: border-color .2s, box-shadow .2s;
    margin-bottom: 24px;
  }

  input:focus {
    border-color: var(--accent);
    box-shadow: 0 0 0 3px rgba(74,222,128,.1);
  }

  button {
    width: 100%;
    background: var(--accent);
    color: #000;
    border: none;
    border-radius: 10px;
    padding: 13px;
    font-size: 15px;
    font-weight: 600;
    font-family: "DM Sans", sans-serif;
    cursor: pointer;
    transition: background .2s, transform .1s;
  }

  button:hover  { background: var(--accent2); }
  button:active { transform: scale(.98); }

  button:disabled {
    opacity: .5;
    cursor: not-allowed;
  }

  .error {
    background: rgba(248,113,113,.1);
    border: 1px solid rgba(248,113,113,.3);
    border-radius: 8px;
    padding: 10px 14px;
    font-size: 13px;
    color: var(--danger);
    margin-top: 16px;
    display: none;
  }

  .error.show { display: block; animation: shake .3s ease; }

  @keyframes shake {
    0%,100% { transform: translateX(0); }
    25%      { transform: translateX(-6px); }
    75%      { transform: translateX(6px); }
  }
</style>
</head>
<body>
<div class="card">
  <div class="logo">
    <div class="logo-icon">💬</div>
    <div>
      <div class="logo-text">HR Dashboard</div>
      <div class="logo-sub">WA Bridge</div>
    </div>
  </div>
  <h1>Masuk</h1>
  <p class="subtitle">Masukkan password untuk akses dashboard</p>

  <label for="password">Password</label>
  <input type="password" id="password" placeholder="••••••••" autocomplete="current-password">

  <button id="loginBtn" onclick="doLogin()">Masuk</button>
  <div class="error" id="errorMsg"></div>
</div>

<script>
  // Auto redirect kalau sudah login
  if (localStorage.getItem("hr_token")) {
    window.location.href = "/dashboard/app.html";
  }

  document.getElementById("password").addEventListener("keydown", e => {
    if (e.key === "Enter") doLogin();
  });

  async function doLogin() {
    const btn = document.getElementById("loginBtn");
    const err = document.getElementById("errorMsg");
    const pwd = document.getElementById("password").value;

    if (!pwd) return;

    btn.disabled = true;
    btn.textContent = "Masuk...";
    err.classList.remove("show");

    try {
      const res  = await fetch("/api/login", {
        method:  "POST",
        headers: { "Content-Type": "application/json" },
        body:    JSON.stringify({ password: pwd }),
      });
      const data = await res.json();

      if (res.ok && data.token) {
        localStorage.setItem("hr_token", data.token);
        window.location.href = "/dashboard/app.html";
      } else {
        err.textContent = data.error || "Password salah";
        err.classList.add("show");
        btn.disabled = false;
        btn.textContent = "Masuk";
      }
    } catch(e) {
      err.textContent = "Gagal terhubung ke server";
      err.classList.add("show");
      btn.disabled = false;
      btn.textContent = "Masuk";
    }
  }
</script>
</body>
</html>
